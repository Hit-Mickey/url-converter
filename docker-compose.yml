services:
  url-converter:
    image: python:3.11-alpine
    container_name: url-converter-dev
    ports:
      - "11111:5000"
    
    # --- 在这里设置你的自定义账号密码 ---
    # environment:
      # - CONVERTER_USER=mickey
      # - CONVERTER_PASS=1
      
    volumes:
      - ./:/app
    working_dir: /app
    command: sh -c "pip install flask pyyaml --no-cache-dir && python app.py"
    restart: unless-stopped